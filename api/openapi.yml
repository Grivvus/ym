openapi: 3.0.3
info:
  title: ym music service
  version: "0.1.0"

paths:
  /ping:
    get:
      security: []
      summary: route to test, that server is alive
      operationId: ping
      responses:
        '200':
          description: server is alive
  /auth/login:
    post:
      security: []
      summary: login user into account
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserAuth'
      responses:
        '200':
          description: User was logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Error on invalid user credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/register:
    post:
      security: []
      summary: register new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserAuth'
      responses:
        '201':
          description: New user account was created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Error if user already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/refresh:
    post:
      security: []
      summary: update jwt tokens
      operationId: refreshTokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTokenRequest'
      responses:
        '200':
          description: token were successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/{userId}:
    get:
      summary: get user by id
      operationId: getUserById
      parameters:
        - in: path
          name: userId
          schema:
            type: integer
            format: int32
          required: true
          description: user id, represented as int
      responses:
        '200':
          description: User data fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserReturn'
        '401':
          description: Unauthorized access, if something goes wrong with tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User with this id not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: update user
      operationId: changeUser
      parameters:
        - in: path
          name: userId
          schema:
            type: integer
            format: int32
          required: true
          description: user id, represented as int
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: User was successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserReturn'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/{userId}/avatar:
    get:
      summary: get uploaded avatar
      operationId: getUserAvatar
      parameters:
        - in: path
          name: userId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: avatar was found
          content:
            image/webp:
              schema:
                type: string
                format: binary
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: avatar wasn't found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: upload new user's avatar to server
      operationId: uploadUserAvatar
      parameters:
        - in: path
          name: userId
          schema:
            type: integer
            format: int32
          required: true
      requestBody:
        required: true
        content:
          image/webp:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: avatar was successfully uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: wrong format of an image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: delete current avatar
      operationId: deleteUserAvatar
      parameters:
        - in: path
          name: userId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: avatar was successfully deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/{userId}/change_password:
    patch:
      summary: change user's password
      operationId: changePassword
      parameters:
        - in: path
          name: userId
          schema:
            type: integer
            format: int32
          required: true
          description: user id, represented as int
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserChangePassword'
      responses:
        '200':
          description: User's password was successfully updated
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid old password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /track:
    post:
      summary: uploads new track, make all transcoding stuff, stores it
      operationId: uploadTrack
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TrackUploadRequest'
            encoding:
              track:
                contentType: audio/*
      responses:
        '200':
          description: Track uploaded and processed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackUploadSuccessResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Unsupported media type, uploading file is not an audio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: get all uploaded tracks meta
      operationId: getTracks
      responses:
        '200':
          description: tracks was successfully fetched
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TrackMetadata'
        '404':
          description: unkown userId
  /track/{trackId}:
    delete:
      summary: delete track
      operationId: deleteTrack
      parameters:
        - in: path
          name: trackId
          schema:
            type: integer
            format: int32
          required: true
          description: track id, represented as int
      responses:
        '200':
          description: Track was successfully deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No such Track
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: getting track metadata
      operationId: getTrackMeta
      parameters:
        - in: path
          name: trackId
          schema:
            type: integer
            format: int32
          required: true
          description: track id, represented as int
      responses:
        '200':
          description: track meta was successfully fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackMetadata'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no track found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /track/{id}/stream:
    head:
      summary: getting track metadata, needed for streaming
      operationId: streamTrackHead
      parameters:
        - in: path
          name: id
          schema:
            type: integer
            format: int32
          required: true
        - in: query
          name: quality
          schema:
            type: string
          required: false
      responses: 
        '200':
          description: "metadata was fetched"
        '401':
          description: "unauthorized"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: "no track found"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: getting track stream
      operationId: streamTrack
      parameters:
        - in: path
          name: id
          schema:
            type: integer
            format: int32
          required: true
        - in: query
          name: quality
          schema:
            type: string
          required: false
      responses:
        '200':
          description: "start streaming"
          content:
            audio/*:
              schema:
                type: string
                format: binary
        '206':
          description: "partial"
          content:
            audio/*:
              schema:
                type: string
                format: binary
        '416':
          description: "invalid range"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: "unauthorized"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: "no track found"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /artist/create:
    post:
      summary: creates new artist
      operationId: createArtist
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ArtistCreateRequest'
      responses:
        '201':
          description: artist was created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtistCreateResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /artist/{artistId}:
    get:
      summary: get info about artist
      operationId: getArtist
      parameters:
        - in: path
          name: artistId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: artist info was successfully fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtistInfoResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no artist was found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: deletes artist by id
      operationId: deleteArtist
      parameters:
        - in: path
          name: artistId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: artist was successfully deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtistDeleteResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no artist was found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /artist/{artistId}/image:
    post:
      description: uploads a new image of an artist
      operationId: uploadArtistImage
      parameters:
        - in: path
          name: artistId
          schema:
            type: integer
            format: int32
          required: true
      requestBody:
        content:
          image/*:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: image of an artist was successfully uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtistImageResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no artist was found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      description: deletes an image of an artist, if there's none no-op
      operationId: deleteArtistImage
      parameters:
        - in: path
          name: artistId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: image of an artist was successfully deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtistImageResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no artist was found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      description: fetching image of an artist
      operationId: getArtistImage
      parameters:
        - in: path
          name: artistId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: image of an artist was successfully fetched
          content:
            image/webp:
              schema:
                type: string
                format: binary
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no artist was found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /playlist:
    post:
      summary: creates new playlist
      operationId: createPlaylist
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PlaylistCreateRequest'
      responses:
        '201':
          description: playlist was created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistCreateResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: get all user's playlist
      operationId: getPlaylists
      responses :
        '200':
          description: playlists was fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Playlists'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /playlist/{playlistId}:
    post:
      summary: add track to playlist
      operationId: addTrackToPlaylist
      parameters:
        - in: path
          name: playlistId
          schema: 
            type: integer
            format: int32
          required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - track_id
              properties:
                track_id:
                  type: integer
                  format: int32
      responses:
        '200':
          description: track was successfully added to playlist
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no playlist found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: update playlist
      operationId: updatePlaylist
      parameters:
        - in: path
          name: playlistId
          schema:
            type: integer
            format: int32
          required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaylistResponse'
      responses:
        '200':
          description: playlist was successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistWithTracksResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no playlist found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: get info about playlist
      operationId: getPlaylist
      parameters:
        - in: path
          name: playlistId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: playlist data was successfully fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistWithTracksResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no playlist found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: deletes playlist by id
      operationId: deletePlaylist
      parameters:
        - in: path
          name: playlistId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: playlist was successfully deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistDeleteResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no playlist found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /playlist/{playlistId}/cover:
    post:
      description: uploads a new cover for the playlist
      operationId: uploadPlaylistCover
      parameters:
        - in: path
          name: playlistId
          schema:
            type: integer
            format: int32
          required: true
      requestBody:
        content:
          image/*:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: cover of the playlist was successfully uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistCoverResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no playlist was found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      description: deletes the playlist's cover, if there's none no-op
      operationId: deletePlaylistCover
      parameters:
        - in: path
          name: playlistId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: cover of the playlist was successfully deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistCoverResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no playlist was found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      description: fetching cover of the playlist
      operationId: getPlaylistCover
      parameters:
        - in: path
          name: playlistId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: cover of the playlist was successfully fetched
          content:
            image/webp:
              schema:
                type: string
                format: binary
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no playlist was found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /album/create:
    post:
      summary: creates new album
      operationId: createAlbum
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AlbumCreateRequest'
      responses:
        '201':
          description: album was created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumCreateResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /album/{albumId}:
    get:
      summary: get info about the album
      operationId: getAlbum
      parameters:
        - in: path
          name: albumId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: album data was successfully fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumInfoResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no album found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: deletes album by id
      operationId: deleteAlbum
      parameters:
        - in: path
          name: albumId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: album was successfully deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumDeleteResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no album found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /album/{albumId}/cover:
    post:
      description: uploads a new cover for the album
      operationId: uploadAlbumCover
      parameters:
        - in: path
          name: albumId
          schema:
            type: integer
            format: int32
          required: true
      requestBody:
        content:
          image/*:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: cover of the album was successfully uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumCoverResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no album was found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      description: deletes the album's cover, if there's none no-op
      operationId: deleteAlbumCover
      parameters:
        - in: path
          name: albumId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: cover of the album was successfully deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumCoverResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no album was found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      description: fetching cover of the album
      operationId: getAlbumCover
      parameters:
        - in: path
          name: albumId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: cover of the album was successfully fetched
          content:
            image/webp:
              schema:
                type: string
                format: binary
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no album was found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserAuth:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    UserReturn:
      type: object
