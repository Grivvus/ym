openapi: 3.0.3
info:
  title: YM Music Service
  version: "0.1.0"

paths:
  /ping:
    get:
      security: []
      summary: Checks whether the server is alive.
      operationId: ping
      responses:
        '200':
          description: The server is alive.

  /auth/login:
    post:
      security: []
      summary: Logs a user into their account.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserAuth'
      responses:
        '200':
          description: The user was logged in successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Invalid user credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/register:
    post:
      security: []
      summary: Registers a new user.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserAuth'
      responses:
        '201':
          description: A new user account was created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '409':
          description: A user with these credentials already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      security: []
      summary: Refreshes JWT tokens.
      operationId: refreshTokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTokenRequest'
      responses:
        '200':
          description: Tokens were refreshed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Invalid or expired refresh token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/password-reset/request:
    post:
      security: []
      summary: Requests a password reset code by email.
      operationId: requestPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '202':
          description: The request was accepted regardless of whether the email exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid email format or malformed request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Password reset is unavailable because email delivery is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/password-reset/confirm:
    post:
      security: []
      summary: Resets a password using the code sent by email.
      operationId: confirmPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
      responses:
        '200':
          description: The password was reset successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid request body, invalid code, or expired code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Password reset is unavailable because email delivery is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users:
    get:
      summary: Gets all user IDs and usernames.
      operationId: getAllUsers
      responses:
        '200':
          description: Users were fetched successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Users'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{userId}:
    get:
      summary: Gets a user by ID.
      operationId: getUser
      parameters:
        - in: path
          name: userId
          schema:
            type: integer
            format: int32
          required: true
          description: User ID represented as an integer.
      responses:
        '200':
          description: User data was fetched successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserReturn'
        '401':
          description: Unauthorized access.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: The user does not have access to this information.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Updates a user.
      operationId: changeUser
      parameters:
        - in: path
          name: userId
          schema:
            type: integer
            format: int32
          required: true
          description: User ID represented as an integer.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: The user was updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserReturn'
        '400':
          description: Invalid request data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: You do not have permission to modify this user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{userId}/simple:
    get:
      summary: Gets a user by ID.
      operationId: getSimpleUser
      parameters:
        - in: path
          name: userId
          schema:
            type: integer
            format: int32
          required: true
          description: User ID represented as an integer.
      responses:
        '200':
          description: User data was fetched successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleUser'
        '401':
          description: Unauthorized access.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{userId}/avatar:
    get:
      summary: Gets the uploaded user avatar.
      operationId: getUserAvatar
      parameters:
        - in: path
          name: userId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: The avatar image was returned successfully.
          content:
            image/webp:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Avatar not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Uploads a new user avatar to the server.
      operationId: uploadUserAvatar
      parameters:
        - in: path
          name: userId
          schema:
            type: integer
            format: int32
          required: true
      requestBody:
        required: true
        content:
          image/webp:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: The avatar was uploaded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid image format.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: You can not modify this user's avatar.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Deletes the current avatar.
      operationId: deleteUserAvatar
      parameters:
        - in: path
          name: userId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: The avatar was deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: You can not modify this user's avatar.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{userId}/change_password:
    patch:
      summary: Changes a user's password.
      operationId: changePassword
      parameters:
        - in: path
          name: userId
          schema:
            type: integer
            format: int32
          required: true
          description: User ID represented as an integer.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserChangePassword'
      responses:
        '200':
          description: The user's password was changed successfully.
        '400':
          description: Invalid old password.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: You can not modify this user's password

  /tracks:
    post:
      summary: Uploads a new track, queues transcoding, and stores it.
      operationId: uploadTrack
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TrackUploadRequest'
      responses:
        '202':
          description: The track was uploaded and accepted into the transcoding queue.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackUploadSuccessResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Unsupported media type. The uploaded file is not a supported audio file.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: Gets metadata for all uploaded tracks.
      operationId: getTracks
      responses:
        '200':
          description: Tracks were fetched successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TrackMetadata'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tracks/{trackId}:
    delete:
      summary: Deletes a track.
      operationId: deleteTrack
      parameters:
        - in: path
          name: trackId
          schema:
            type: integer
            format: int32
          required: true
          description: Track ID represented as an integer.
      responses:
        '200':
          description: The track was deleted successfully.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: The user can not delete this track.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Track not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: Gets track metadata.
      operationId: getTrackMeta
      parameters:
        - in: path
          name: trackId
          schema:
            type: integer
            format: int32
          required: true
          description: Track ID represented as an integer.
      responses:
        '200':
          description: Track metadata was fetched successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackMetadata'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: The user does not have access to this track.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Track not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tracks/{id}/stream:
    head:
      summary: Gets track metadata required for streaming.
      operationId: streamTrackHead
      parameters:
        - in: path
          name: id
          schema:
            type: integer
            format: int32
          required: true
        - in: query
          name: quality
          schema:
            type: string
          description: Preferred quality. If unavailable, the server falls back to the closest available preset, then to the original track file.
          required: false
      responses:
        '200':
          description: Streaming metadata was fetched successfully.
          headers:
            Content-Type:
              description: Media type of the track file.
              schema:
                type: string
              example: audio/mpeg
            Content-Length:
              description: Full streamable file size in bytes.
              schema:
                type: integer
                format: int64
              example: 8423912
            Accept-Ranges:
              description: Indicates that byte-range requests are supported.
              schema:
                type: string
                enum: [bytes]
              example: bytes
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: The user does not have access to this track.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Track not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: Streams a track.
      operationId: streamTrack
      parameters:
        - in: path
          name: id
          schema:
            type: integer
            format: int32
          required: true
        - in: query
          name: quality
          schema:
            type: string
          description: Preferred quality. If unavailable, the server falls back to the closest available preset, then to the original track file.
          required: false
      responses:
        '200':
          description: The track stream was returned successfully.
          content:
            audio/*:
              schema:
                type: string
                format: binary
        '206':
          description: Partial content was returned successfully.
          content:
            audio/*:
              schema:
                type: string
                format: binary
        '416':
          description: Invalid byte range.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: The user does not have access to this track.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Track not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tracks/{id}/download:
    head:
      summary: Gets track metadata required for download.
      operationId: downloadTrackHead
      parameters:
        - in: path
          name: id
          schema:
            type: integer
            format: int32
          required: true
        - in: query
          name: quality
          schema:
            type: string
          description: Preferred quality. If unavailable, the server falls back to the closest available preset, then to the original track file.
          required: false
      responses:
        '200':
          description: Download metadata was fetched successfully.
          headers:
            Content-Type:
              description: Media type of the downloadable track file.
              schema:
                type: string
              example: audio/mpeg
            Content-Length:
              description: Full downloadable file size in bytes.
              schema:
                type: integer
                format: int64
              example: 8423912
            Accept-Ranges:
              description: Indicates that byte-range requests are supported.
              schema:
                type: string
                enum: [bytes]
              example: bytes
            ETag:
              description: Opaque identifier for this exact downloadable file version.
              schema:
                type: string
              example: '"track-123-standard-v5"'
            Content-Disposition:
              description: Suggested filename for saving the track.
              schema:
                type: string
              example: attachment; filename*=UTF-8''artist-title.mp3
            X-Track-Quality-Requested:
              description: Quality requested by the client.
              schema:
                type: string
                enum: [fast, standard, high, lossless]
              example: standard
            X-Track-Quality-Resolved:
              description: Actual quality selected by the server.
              schema:
                type: string
                enum: [fast, standard, high, lossless, original]
              example: standard
            X-Track-Checksum-Sha256:
              description: SHA-256 checksum of the full downloadable file.
              schema:
                type: string
              example: 0b4f0c7a...
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: The user does not have access to this track.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Track not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: Downloads a track file.
      operationId: downloadTrack
      parameters:
        - in: path
          name: id
          schema:
            type: integer
            format: int32
          required: true
        - in: query
          name: quality
          schema:
            type: string
          description: Preferred quality. If unavailable, the server falls back to the closest available preset, then to the original track file.
          required: false
      responses:
        '200':
          description: The track file was returned successfully.
          content:
            audio/*:
              schema:
                type: string
                format: binary
        '206':
          description: Partial content was returned successfully.
          content:
            audio/*:
              schema:
                type: string
                format: binary
        '416':
          description: Invalid byte range.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: The user does not have access to this track.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Track not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /artists:
    post:
      summary: Creates a new artist.
      operationId: createArtist
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ArtistCreateRequest'
      responses:
        '201':
          description: The artist was created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtistCreateResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict. The artist already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: Gets a list of all artists.
      operationId: getAllArtists
      parameters:
        - in: query
          name: starts_with
          schema:
            type: string
          description: Query parameter for searching or filtering artists.
        - in: query
          name: limit
          schema:
            type: integer
          description: Maximum number of artists to return.
      responses:
        '200':
          description: Artists were fetched successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArtistInfoResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /artists/{artistId}:
    get:
      summary: Gets artist information.
      operationId: getArtist
      parameters:
        - in: path
          name: artistId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: Artist information was fetched successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtistInfoResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Artist not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Deletes an artist by ID.
      operationId: deleteArtist
      parameters:
        - in: path
          name: artistId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: The artist was deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtistDeleteResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /artists/{artistId}/image:
    post:
      description: Uploads a new image for the artist.
      operationId: uploadArtistImage
      parameters:
        - in: path
          name: artistId
          schema:
            type: integer
            format: int32
          required: true
      requestBody:
        content:
          image/*:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: The artist image was uploaded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtistImageResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Artist not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      description: Deletes the artist image. If no image exists, the operation is a no-op.
      operationId: deleteArtistImage
      parameters:
        - in: path
          name: artistId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: The artist image was deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtistImageResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Artist not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      description: Fetches the artist image.
      operationId: getArtistImage
      parameters:
        - in: path
          name: artistId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: The artist image was fetched successfully.
          content:
            image/webp:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Artist not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /playlists:
    post:
      summary: Creates a new playlist.
      operationId: createPlaylist
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PlaylistCreateRequest'
      responses:
        '201':
          description: The playlist was created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistCreateResponse'
        '400':
          description: Required parameters are missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict. A playlist with this name already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: Gets all playlists available to the user.
