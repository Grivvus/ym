  /backup:
    post:
      description: Starts a full application backup.
      operationId: backup
      parameters:
        - in: query
          name: include_images
          schema:
            type: boolean
        - in: query
          name: include_transcoded_tracks
          schema:
            type: boolean
      responses:
        '202':
          description: The backup operation was started.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupStatusResponse'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Superuser access required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: A backup operation has already been started.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /backup/{backupId}:
    get:
      description: Gets the status of a backup operation.
      operationId: getBackupStatus
      parameters:
        - in: path
          name: backupId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Backup status was fetched successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupStatusResponse'
        '400':
          description: Invalid backup state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Superuser access required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Backup operation not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /backup/{backupId}/download:
    get:
      description: Downloads a finished backup archive.
      operationId: downloadBackup
      parameters:
        - in: path
          name: backupId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The backup archive was returned successfully.
          headers:
            Content-Disposition:
              description: Suggested filename for the backup archive.
              schema:
                type: string
                example: attachment; filename="ym-backup-2026-04-12T10-00-00Z.zip"
            Cache-Control:
              description: Prevents caching of the backup archive.
              schema:
                type: string
                example: no-store
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid backup state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Superuser access required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Backup operation not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Backup operation is not finished yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /restore:
    post:
      description: Restores application data from a backup archive.
      operationId: restore
      requestBody:
        required: true
        content:
          application/zip:
            schema:
              type: string
              format: binary
      responses:
        '202':
          description: The archive was received and validated.
          content:
            application/json:
              schema:
                type: string
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Superuser access required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: A restore operation has already been started.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /restore/{restoreId}:
    get:
      description: Gets the status of a restore operation.
      operationId: getRestoreStatus
      parameters:
        - in: path
          name: restoreId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Restore status was fetched successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestoreStatusResponse'
        '400':
          description: Invalid restore state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Superuser access required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Restore operation not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    OperationStatus:
      type: string
      enum:
        - pending
        - started
        - finished
        - error

    BackupStatusResponse:
      type: object
      required:
        - backup_id
        - status
        - include_images
        - include_transcoded_tracks
      properties:
        backup_id:
          type: string
        status:
          $ref: '#/components/schemas/OperationStatus'
        include_images:
          type: boolean
        include_transcoded_tracks:
          type: boolean
        size_bytes:
          type: integer
          format: int64
        error:
          type: string
          nullable: true

    RestoreStatusResponse:
      type: object
      required:
        - restore_id
        - status
      properties:
        restore_id:
          type: string
        status:
          $ref: '#/components/schemas/OperationStatus'
        error:
          type: string
          nullable: true

    UserAuth:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    SimpleUser:
      type: object
      required:
        - id
        - username
      properties:
        id:
          type: integer
          format: int32
        username:
          type: string

    Users:
      type: array
      items:
        $ref: '#/components/schemas/SimpleUser'

    UserReturn:
      type: object
      required:
        - username
        - email
        - id
        - is_superuser
      properties:
        id:
          type: integer
          format: int32
        username:
          type: string
        is_superuser:
          type: boolean
        email:
          type: string
          nullable: true

    UserChangePassword:
      type: object
      required:
        - old_password
        - new_password
      properties:
        old_password:
          type: string
        new_password:
          type: string

    PasswordResetRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email

    PasswordResetConfirmRequest:
      type: object
      required:
        - email
        - code
        - new_password
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          minLength: 6
        new_password:
          type: string
          format: password
          minLength: 6

    UserUpdate:
      type: object
      properties:
        new_username:
          type: string
        new_email:
          type: string
          format: email

    UpdateTokenRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string

    TokenResponse:
      type: object
      required:
        - user_id
        - token_type
        - access_token
        - refresh_token
      properties:
        user_id:
          type: integer
          format: int32
        token_type:
          type: string
        access_token:
          type: string
        refresh_token:
          type: string

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string

    MessageResponse:
      type: object
      required:
        - msg
      properties:
        msg:
          type: string

    TrackUploadSuccessResponse:
      type: object
      required:
        - track_id
      properties:
        track_id:
          type: integer
          format: int32

    TrackUploadRequest:
      type: object
      required:
        - name
        - artist_id
        - track
      properties:
        name:
          type: string
        album_id:
          type: integer
          format: int32
        is_single:
          type: boolean
        is_globally_available:
          type: boolean
        artist_id:
          type: integer
          format: int32
        track:
          type: string
          format: binary

    TrackMetadata:
      type: object
      required:
        - track_id
        - name
        - artist_id
        - album_id
        - duration_ms
      properties:
        track_id:
          type: integer
          format: int32
        name:
          type: string
        artist_id:
          type: integer
          format: int32
        album_id:
          type: integer
          format: int32
        duration_ms:
          type: integer
          format: int32
        track_fast_preset:
          type: string
        track_standard_preset:
          type: string
        track_high_preset:
          type: string
        track_lossless_preset:
          type: string

    ArtistCreateRequest:
      type: object
      required:
        - artist_name
      properties:
        artist_name:
          type: string
        artist_image:
          type: string
          format: binary

    ArtistCreateResponse:
      type: object
      required:
        - artist_id
        - cover_uploaded
      properties:
        artist_id:
          type: integer
          format: int32
        cover_uploaded:
          type: boolean

    ArtistInfoResponse:
      type: object
      required:
        - artist_id
        - artist_name
        - artist_albums
      properties:
        artist_id:
          type: integer
          format: int32
        artist_name:
          type: string
        artist_albums:
          type: array
          items:
            type: integer
            format: int32

    ArtistDeleteResponse:
      type: object
      required:
        - artist_id
      properties:
        artist_id:
          type: integer
          format: int32

    ArtistImageResponse:
      type: object
      required:
        - artist_id
      properties:
        artist_id:
          type: integer
          format: int32

    PlaylistCreateRequest:
      type: object
      required:
        - owner_id
        - playlist_name
        - is_public
      properties:
        owner_id:
          type: integer
          format: int32
        playlist_name:
          type: string
        is_public:
          type: boolean
        playlist_cover:
          type: string
          format: binary

    PlaylistCreateResponse:
      type: object
      required:
        - playlist_id
        - cover_uploaded
      properties:
        playlist_id:
          type: integer
          format: int32
        cover_uploaded:
          type: boolean

    PlaylistWithTracksResponse:
      type: object
      required:
        - playlist_id
        - playlist_name
        - tracks
        - shared_with
      properties:
        playlist_id:
          type: integer
          format: int32
        playlist_name:
          type: string
        tracks:
          type: array
          items:
            type: integer
            format: int32
        shared_with:
          type: array
          items:
            type: integer
            format: int32

    PlaylistUpdateRequest:
      type: object
      required:
        - playlist_name
      properties:
        playlist_name:
          type: string

    PlaylistShareRequest:
      type: object
      required:
        - share_with_users
        - has_write_permission
      properties:
