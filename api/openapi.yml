openapi: 3.0.3
info:
  title: ym music service
  version: "0.1.0"

paths:
  /ping:
    get:
      security: []
      summary: route to test, that server is alive
      operationId: ping
      responses:
        '200':
          description: server is alive
  /auth/login:
    post:
      security: []
      summary: login user into account
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserAuth'
      responses:
        '200':
          description: User was logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Error on invalid user credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/register:
    post:
      security: []
      summary: register new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserAuth'
      responses:
        '201':
          description: New user account was created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '409':
          description: Error if user already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/refresh:
    post:
      security: []
      summary: update jwt tokens
      operationId: refreshTokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTokenRequest'
      responses:
        '200':
          description: token were successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/password-reset/request:
    post:
      security: []
      summary: request a password reset code by email
      operationId: requestPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '202':
          description: Request accepted regardless of whether the email exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid email format or malformed request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Password reset is unavailable because email delivery is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/password-reset/confirm:
    post:
      security: []
      summary: reset password using the code sent by email
      operationId: confirmPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
      responses:
        '200':
          description: Password was successfully reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid body, invalid code, or expired code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Password reset is unavailable because email delivery is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{userId}:
    get:
      summary: get user by id
      operationId: getUser
      parameters:
        - in: path
          name: userId
          schema:
            type: integer
            format: int32
          required: true
          description: user id, represented as int
      responses:
        '200':
          description: User data fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserReturn'
        '401':
          description: Unauthorized access, if something goes wrong with tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User with this id not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: update user
      operationId: changeUser
      parameters:
        - in: path
          name: userId
          schema:
            type: integer
            format: int32
          required: true
          description: user id, represented as int
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: User was successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserReturn'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{userId}/avatar:
    get:
      summary: get uploaded avatar
      operationId: getUserAvatar
      parameters:
        - in: path
          name: userId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: avatar was found
          content:
            image/webp:
              schema:
                type: string
                format: binary
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: avatar wasn't found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: upload new user's avatar to server
      operationId: uploadUserAvatar
      parameters:
        - in: path
          name: userId
          schema:
            type: integer
            format: int32
          required: true
      requestBody:
        required: true
        content:
          image/webp:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: avatar was successfully uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: wrong format of an image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: delete current avatar
      operationId: deleteUserAvatar
      parameters:
        - in: path
          name: userId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: avatar was successfully deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{userId}/change_password:
    patch:
      summary: change user's password
      operationId: changePassword
      parameters:
        - in: path
          name: userId
          schema:
            type: integer
            format: int32
          required: true
          description: user id, represented as int
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserChangePassword'
      responses:
        '200':
          description: User's password was successfully updated
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid old password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tracks:
    post:
      summary: uploads new track, make all transcoding stuff, stores it
      operationId: uploadTrack
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TrackUploadRequest'
            # encoding:
            #   track:
            #     contentType: audio/*
      responses:
        '202':
          description: Track uploaded and accepted into the transcoding queue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackUploadSuccessResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Unsupported media type, uploading file is not an audio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: get all uploaded tracks meta
      operationId: getTracks
      responses:
        '200':
          description: tracks was successfully fetched
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TrackMetadata'
        '404':
          description: unknown userId

  /tracks/{trackId}:
    delete:
      summary: delete track
      operationId: deleteTrack
      parameters:
        - in: path
          name: trackId
          schema:
            type: integer
            format: int32
          required: true
          description: track id, represented as int
      responses:
        '200':
          description: Track was successfully deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No such Track
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: getting track metadata
      operationId: getTrackMeta
      parameters:
        - in: path
          name: trackId
          schema:
            type: integer
            format: int32
          required: true
          description: track id, represented as int
      responses:
        '200':
          description: track meta was successfully fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackMetadata'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no track found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tracks/{id}/stream:
    head:
      summary: getting track metadata, needed for streaming
      operationId: streamTrackHead
      parameters:
        - in: path
          name: id
          schema:
            type: integer
            format: int32
          required: true
        - in: query
          name: quality
          schema:
            type: string
          description: preferred quality; the server falls back to the closest available preset and then to the original track file
          required: false
      responses: 
        '200':
          description: "metadata was fetched"
          headers:
            Content-Type:
              description: information about track format
              schema:
                type: string
              example: audio/mpeg
            Content-Length:
              description: Full downloadable file size in bytes
              schema:
                type: integer
                format: int64
              example: 8423912
            Accept-Ranges:
              description: Indicates whether byte-range requests are supported
              schema:
                type: string
                enum: [bytes]
              example: bytes
        '401':
          description: "unauthorized"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: "user can't have access to this track"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: "no track found"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: getting track stream
      operationId: streamTrack
      parameters:
        - in: path
          name: id
          schema:
            type: integer
            format: int32
          required: true
        - in: query
          name: quality
          schema:
            type: string
          description: preferred quality; the server falls back to the closest available preset and then to the original track file
          required: false
      responses:
        '200':
          description: "start streaming"
          content:
            audio/*:
              schema:
                type: string
                format: binary
        '206':
          description: "partial"
          content:
            audio/*:
              schema:
                type: string
                format: binary
        '416':
          description: "invalid range"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: "unauthorized"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: "user can't have access to this track"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: "no track found"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tracks/{id}/download:
    head:
      summary: getting track metadata, needed for download
      operationId: downloadTrackHead
      parameters:
        - in: path
          name: id
          schema:
            type: integer
            format: int32
          required: true
        - in: query
          name: quality
          schema:
            type: string
          description: preferred quality; the server falls back to the closest available preset and then to the original track file
          required: false
      responses:
        '200':
          description: "metadata was fetched"
          headers:
            Content-Type:
              description: information about track format
              schema:
                type: string
              example: audio/mpeg
            Content-Length:
              description: Full downloadable file size in bytes
              schema:
                type: integer
                format: int64
              example: 8423912
            Accept-Ranges:
              description: Indicates whether byte-range requests are supported
              schema:
                type: string
                enum: [bytes]
              example: bytes
            ETag:
              description: Opaque identifier of this exact downloadable file version
              schema:
                type: string
              example: '"track-123-standard-v5"'
            Content-Disposition:
              description: Suggested filename for saving the track
              schema:
                type: string
              example: attachment; filename*=UTF-8''artist-title.mp3
            X-Track-Quality-Requested:
              description: Quality requested by the client
              schema:
                type: string
                enum: [fast, standard, high, lossless]
              example: standard
            X-Track-Quality-Resolved:
              description: Actual quality selected by the server
              schema:
                type: string
                enum: [fast, standard, high, lossless, original]
              example: standard
            X-Track-Checksum-Sha256:
              description: SHA-256 checksum of the full downloadable file
              schema:
                type: string
              example: 0b4f0c7a...
        '401':
          description: "unauthorized"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: "user can't have access to this track"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: "no track found"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: downloading track file
      operationId: downloadTrack
      parameters:
        - in: path
          name: id
          schema:
            type: integer
            format: int32
          required: true
        - in: query
          name: quality
          schema:
            type: string
          description: preferred quality; the server falls back to the closest available preset and then to the original track file
          required: false
      responses:
        '200':
          description: "start downloading"
          content:
            audio/*:
              schema:
                type: string
                format: binary
        '206':
          description: "partial"
          content:
            audio/*:
              schema:
                type: string
                format: binary
        '416':
          description: "invalid range"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: "unauthorized"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: "user can't have access to this track"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: "no track found"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /artists:
    post:
      summary: creates new artist
      operationId: createArtist
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ArtistCreateRequest'
      responses:
        '201':
          description: artist was created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtistCreateResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: conflict, artist already exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: get list of all artists
      operationId: getAllArtists
      parameters:
        - in: query
          name: starts_with
          schema:
            type: string
          description: query parameter for searching/filtering artists
        - in: query
          name: limit
          schema:
            type: integer
          description: limit on a number of artists
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArtistInfoResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /artists/{artistId}:
    get:
      summary: get info about artist
      operationId: getArtist
      parameters:
        - in: path
          name: artistId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: artist info was successfully fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtistInfoResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no artist was found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: deletes artist by id
      operationId: deleteArtist
      parameters:
        - in: path
          name: artistId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: artist was successfully deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtistDeleteResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /artists/{artistId}/image:
    post:
      description: uploads a new image of an artist
      operationId: uploadArtistImage
      parameters:
        - in: path
          name: artistId
          schema:
            type: integer
            format: int32
          required: true
      requestBody:
        content:
          image/*:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: image of an artist was successfully uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtistImageResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no artist was found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      description: deletes an image of an artist, if there's none no-op
      operationId: deleteArtistImage
      parameters:
        - in: path
          name: artistId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: image of an artist was successfully deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtistImageResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no artist was found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      description: fetching image of an artist
      operationId: getArtistImage
      parameters:
        - in: path
          name: artistId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: image of an artist was successfully fetched
          content:
            image/webp:
              schema:
                type: string
                format: binary
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no artist was found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /playlists:
    post:
      summary: creates new playlist
      operationId: createPlaylist
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PlaylistCreateRequest'
      responses:
        '201':
          description: playlist was created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistCreateResponse'
        '400':
          description: can't find required params
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: conflict, playlist with this name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: get all playlists available to the user
      operationId: getPlaylists
      parameters:
        - in: query
          name: include_public
          schema:
            type: boolean
        - in: query
          name: include_shared
          schema:
            type: boolean
        - in: query
          name: include_owned
          schema:
            type: boolean
      responses :
        '200':
          description: playlists was fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Playlists'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /playlists/{playlistId}:
    post:
      summary: add track to playlist
      operationId: addTrackToPlaylist
      parameters:
        - in: path
          name: playlistId
          schema: 
            type: integer
            format: int32
          required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - track_id
              properties:
                track_id:
                  type: integer
                  format: int32
      responses:
        '200':
          description: track was successfully added to playlist
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no playlist found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: update playlist
      operationId: updatePlaylist
      parameters:
        - in: path
          name: playlistId
          schema:
            type: integer
            format: int32
          required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaylistUpdateRequest'
      responses:
        '200':
          description: playlist was successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: you have no permition to change this playlist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no playlist found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: get info about playlist
      operationId: getPlaylist
      parameters:
        - in: path
          name: playlistId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: playlist data was successfully fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistWithTracksResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no playlist found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: deletes playlist by id
      operationId: deletePlaylist
      parameters:
        - in: path
          name: playlistId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: playlist was successfully deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistDeleteResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /playlists/{playlistId}/cover:
    post:
      description: uploads a new cover for the playlist
      operationId: uploadPlaylistCover
      parameters:
        - in: path
          name: playlistId
          schema:
            type: integer
            format: int32
          required: true
      requestBody:
        content:
          image/*:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: cover of the playlist was successfully uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistCoverResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no playlist was found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      description: deletes the playlist's cover, if there's none no-op
      operationId: deletePlaylistCover
      parameters:
        - in: path
          name: playlistId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: cover of the playlist was successfully deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistCoverResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no playlist was found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      description: fetching cover of the playlist
      operationId: getPlaylistCover
      parameters:
        - in: path
          name: playlistId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: cover of the playlist was successfully fetched
          content:
            image/webp:
              schema:
                type: string
                format: binary
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no playlist was found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /albums:
    post:
      summary: creates new album
      operationId: createAlbum
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AlbumCreateRequest'
      responses:
        '201':
          description: album was created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumCreateResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: conflict, artist already has album with this name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /albums/{albumId}:
    get:
      summary: get info about the album
      operationId: getAlbum
      parameters:
        - in: path
          name: albumId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: album data was successfully fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumInfoResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no album found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: deletes album by id
      operationId: deleteAlbum
      parameters:
        - in: path
          name: albumId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: album was successfully deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumDeleteResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /albums/{albumId}/cover:
    post:
      description: uploads a new cover for the album
      operationId: uploadAlbumCover
      parameters:
        - in: path
          name: albumId
          schema:
            type: integer
            format: int32
          required: true
      requestBody:
        content:
          image/*:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: cover of the album was successfully uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumCoverResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no album was found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      description: deletes the album's cover, if there's none no-op
      operationId: deleteAlbumCover
      parameters:
        - in: path
          name: albumId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: cover of the album was successfully deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumCoverResponse'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no album was found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      description: fetching cover of the album
      operationId: getAlbumCover
      parameters:
        - in: path
          name: albumId
          schema:
            type: integer
            format: int32
          required: true
      responses:
        '200':
          description: cover of the album was successfully fetched
          content:
            image/webp:
              schema:
                type: string
                format: binary
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: no album was found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /backup:
    get:
      description: download full application backup
      operationId: backup
      parameters:
        - in: query
          name: include_images
          schema:
            type: boolean
        - in: query
          name: include_transcoded_tracks
          schema:
            type: boolean
      responses:
        '200':
          description: backup received
          headers:
            Content-Disposition:
              description: attachment filename
              schema:
                type: string
                example: attachment; filename="ym-backup-2026-04-12T10-00-00Z.zip"
            Cache-Control:
              description: prevent backup archive caching
              schema:
                type: string
                example: no-store
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Superuser access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /restore:
    post:
      description: Restore application data from the backup
      operationId: restore
      requestBody:
        required: true
        content:
          application/zip:
            schema:
              type: string
              format: binary
      responses:
        '202':
          description: archive received and validated
          content:
            application/json:
              schema:
                type: string
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: superuser access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: restore operation was already started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /restore/{restoreId}:
    get:
      description: Get restore operation status
      operationId: getRestoreStatus
      parameters:
        - in: path
          name: restoreId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: restore status fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestoreStatusResponse'
        '400':
          description: found invalid state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: superuser access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: restore operation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RestoreStatusResponse:
      type: object
      required:
        - restore_id
        - status
      properties:
        restore_id:
          type: string
        status:
          type: string
          enum:
            - pending
            - started
            - finished
            - error
        error:
          type: string
          nullable: true

    UserAuth:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    UserReturn:
      type: object
      required:
        - username
        - email
        - id
        - is_superuser
      properties:
        id:
          type: integer
          format: int32
        username:
          type: string
        is_superuser:
          type: boolean
        email:
          type: string
          nullable: true

    UserChangePassword:
      type: object
      required:
        - old_password
        - new_password
      properties:
        old_password:
          type: string
        new_password:
          type: string

    PasswordResetRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email

    PasswordResetConfirmRequest:
      type: object
      required:
        - email
        - code
        - new_password
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          minLength: 6
        new_password:
          type: string
          format: password
          minLength: 6

    UserUpdate:
      type: object
      properties:
        new_username:
          type: string
        new_email:
          type: string
          format: email

    UpdateTokenRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string

    TokenResponse:
      type: object
      required:
        - user_id
        - token_type
        - access_token
        - refresh_token
      properties:
        user_id:
          type: integer
          format: int32
        token_type:
          type: string
        access_token:
          type: string
        refresh_token:
          type: string

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string

    MessageResponse:
      type: object
      required:
        - msg
      properties:
        msg:
          type: string

    TrackUploadSuccessResponse:
      type: object
      required:
        - track_id
      properties:
        track_id:
          type: integer
          format: int32

    TrackUploadRequest:
      type: object
      required:
        - name
        - artist_id
        - track
      properties:
        name:
          type: string
        album_id:
          type: integer
          format: int32
        is_single:
          type: boolean
        is_globally_available:
          type: boolean
        artist_id:
          type: integer
          format: int32
        track:
          type: string
          format: binary

    TrackMetadata:
      type: object
      required:
        - track_id
        - name
        - artist_id
        - album_id
        - duration_ms
      properties:
        track_id:
          type: integer
          format: int32
        name:
          type: string
        artist_id:
          type: integer
          format: int32
        album_id:
          type: integer
          format: int32
        duration_ms:
          type: integer
          format: int32
        track_fast_preset:
          type: string
        track_standard_preset:
          type: string
        track_high_preset:
          type: string
        track_lossless_preset:
          type: string

    ArtistCreateRequest:
      type: object
      required:
        - artist_name
      properties:
        artist_name:
          type: string
        artist_image:
          type: string
          format: binary

    ArtistCreateResponse:
      type: object
      required:
        - artist_id
        - cover_uploaded
      properties:
        artist_id:
          type: integer
          format: int32
        cover_uploaded:
          type: boolean

    ArtistInfoResponse:
      type: object
      required:
        - artist_id
        - artist_name
        - artist_albums
      properties:
        artist_id:
          type: integer
          format: int32
        artist_name:
          type: string
        artist_albums:
          type: array
          items:
            type: integer
            format: int32

    ArtistDeleteResponse:
      type: object
      required:
        - artist_id
      properties:
        artist_id:
          type: integer
          format: int32

    ArtistImageResponse:
      type: object
      required:
        - artist_id
      properties:
        artist_id:
          type: integer
          format: int32

    PlaylistCreateRequest:
      type: object
      required:
        - owner_id
        - playlist_name
        - is_public
      properties:
        owner_id:
          type: integer
          format: int32
        playlist_name:
          type: string
        is_public:
          type: boolean
        playlist_cover:
          type: string
          format: binary

    PlaylistCreateResponse:
      type: object
      required:
        - playlist_id
        - cover_uploaded
      properties:
        playlist_id:
          type: integer
          format: int32
        cover_uploaded:
          type: boolean

    PlaylistWithTracksResponse:
      type: object
      required:
        - playlist_id
        - playlist_name
        - tracks
      properties:
        playlist_id:
          type: integer
          format: int32
        playlist_name:
          type: string
        tracks:
          type: array
          items:
            type: integer
            format: int32

    PlaylistUpdateRequest:
      type: object
      required:
        - playlist_name
      properties:
        playlist_name:
          type: string

    PlaylistResponse:
      type: object
      required:
        - playlist_id
        - playlist_name
      properties:
        playlist_id:
          type: integer
          format: int32
        playlist_name:
          type: string

    ExtendedPlaylist:
        type: object
        required:
          - playlist_id
          - playlist_name
          - playlist_owner_id
          - playlist_type
        properties:
          playlist_id:
            type: integer
            format: int32
          playlist_name:
            type: string
          playlist_owner_id:
            type: integer
            format: int32
          playlist_type:
            type: string
            enum: [owned, public, shared]

    Playlists:
      type: array
      items:
        $ref: '#/components/schemas/ExtendedPlaylist'

    PlaylistDeleteResponse:
      type: object
      required:
        - playlist_id
      properties:
        playlist_id:
          type: integer
          format: int32

    PlaylistCoverResponse:
      type: object
      required:
        - playlist_id
      properties:
        playlist_id:
          type: integer
          format: int32

    AlbumCreateRequest:
      type: object
      required:
        - artist_id
        - album_name
      properties:
        artist_id:
          type: integer
          format: int32
        album_name:
          type: string
        album_cover:
          type: string
          format: binary
        release_year:
          type: integer
          format: int32
        release_full_date:
          type: string
          format: date

    AlbumCreateResponse:
      type: object
      required:
        - album_id
        - cover_uploaded
      properties:
        album_id:
          type: integer
          format: int32
        cover_uploaded:
          type: boolean

    AlbumInfoResponse:
      type: object
      required:
        - album_id
        - album_name
        - tracks
        - release_year
        - release_full_date
      properties:
        album_id:
          type: integer
          format: int32
        album_name:
          type: string
        release_year:
          type: integer
          format: int32
          nullable: true
        release_full_date:
          type: string
          format: date
          nullable: true
        tracks:
          type: array
          items:
            type: integer
            format: int32

    AlbumDeleteResponse:
      type: object
      required:
        - album_id
      properties:
        album_id:
          type: integer
          format: int32

    AlbumCoverResponse:
      type: object
      required:
        - album_id
      properties:
        album_id:
          type: integer
          format: int32

security:
  - bearerAuth: []
